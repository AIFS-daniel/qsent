<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QSent - Sentiment Chart</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      min-height: 100vh;
    }
    h1 { font-size: 1.4rem; margin-bottom: 1.5rem; letter-spacing: 0.05em; color: #fff; }
    .controls {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    input {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1c1f2e;
      color: #fff;
      text-transform: uppercase;
      width: 140px;
    }
    button {
      padding: 0.5rem 1.25rem;
      font-size: 1rem;
      border-radius: 6px;
      border: none;
      background: #4f6ef7;
      color: #fff;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { font-size: 0.85rem; color: #888; margin-bottom: 1rem; min-height: 1.2em; }
    .chart-wrapper {
      width: 100%;
      max-width: 960px;
      background: #1c1f2e;
      border-radius: 12px;
      padding: 1.5rem;
    }
    .meta {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: #aaa;
    }
    .meta span b { color: #fff; }
  </style>
</head>
<body>
  <h1>QSent &mdash; Sentiment Analysis</h1>

  <div class="controls">
    <input id="ticker" type="text" placeholder="AAPL" value="IONQ" />
    <button id="analyzeBtn" onclick="runAnalysis()">Analyze</button>
  </div>

  <div id="status"></div>

  <div class="chart-wrapper" id="chartSection" style="display:none">
    <div class="meta" id="meta"></div>
    <canvas id="chart"></canvas>
  </div>

  <script>
    let chartInstance = null;

    async function runAnalysis() {
      const ticker = document.getElementById("ticker").value.trim().toUpperCase();
      if (!ticker) return;

      const btn = document.getElementById("analyzeBtn");
      const status = document.getElementById("status");

      btn.disabled = true;
      status.textContent = `Fetching data for ${ticker}...`;
      document.getElementById("chartSection").style.display = "none";

      try {
        const res = await fetch("http://localhost:8000/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ticker }),
        });

        if (!res.ok) {
          const err = await res.json();
          status.textContent = `Error: ${err.detail || res.statusText}`;
          return;
        }

        const data = await res.json();
        renderChart(data);
        status.textContent = "";
      } catch (e) {
        status.textContent = `Failed to connect to API: ${e.message}`;
      } finally {
        btn.disabled = false;
      }
    }

    function renderChart(data) {
      const daily = data.daily_data;
      const labels = daily.map(d => d.date);
      const prices = daily.map(d => d.close);
      const newsSentiment = daily.map(d => d.news_sentiment);
      const socialSentiment = daily.map(d => d.social_sentiment);

      // Meta summary
      const trend = data.breakdown?.trend ?? "—";
      const overall = data.sentiment_score?.toFixed(3) ?? "—";
      document.getElementById("meta").innerHTML = `
        <span>Ticker: <b>${data.ticker}</b></span>
        <span>Overall Sentiment: <b>${overall}</b></span>
        <span>Trend: <b>${trend}</b></span>
        <span>Data Points: <b>${data.data_points}</b></span>
      `;

      if (chartInstance) chartInstance.destroy();

      const ctx = document.getElementById("chart").getContext("2d");
      chartInstance = new Chart(ctx, {
        type: "line",
        data: {
          labels,
          datasets: [
            {
              label: "Price (Close)",
              data: prices,
              borderColor: "#4f6ef7",
              backgroundColor: "rgba(79,110,247,0.08)",
              yAxisID: "yPrice",
              tension: 0.3,
              pointRadius: 3,
            },
            {
              label: "News Sentiment",
              data: newsSentiment,
              borderColor: "#f7c948",
              backgroundColor: "rgba(247,201,72,0.08)",
              yAxisID: "ySentiment",
              tension: 0.3,
              pointRadius: 3,
              borderDash: [4, 4],
            },
            {
              label: "Social Sentiment",
              data: socialSentiment,
              borderColor: "#4ecb71",
              backgroundColor: "rgba(78,203,113,0.08)",
              yAxisID: "ySentiment",
              tension: 0.3,
              pointRadius: 3,
              borderDash: [4, 4],
            },
          ],
        },
        options: {
          responsive: true,
          interaction: { mode: "index", intersect: false },
          plugins: {
            legend: { labels: { color: "#ccc" } },
            tooltip: { backgroundColor: "#1c1f2e", titleColor: "#fff", bodyColor: "#ccc" },
          },
          scales: {
            x: {
              ticks: { color: "#888", maxTicksLimit: 10 },
              grid: { color: "rgba(255,255,255,0.05)" },
            },
            yPrice: {
              type: "linear",
              position: "left",
              ticks: { color: "#4f6ef7" },
              grid: { color: "rgba(255,255,255,0.05)" },
              title: { display: true, text: "Price (USD)", color: "#4f6ef7" },
            },
            ySentiment: {
              type: "linear",
              position: "right",
              min: -1,
              max: 1,
              ticks: { color: "#aaa" },
              grid: { drawOnChartArea: false },
              title: { display: true, text: "Sentiment (-1 to 1)", color: "#aaa" },
            },
          },
        },
      });

      document.getElementById("chartSection").style.display = "block";
    }
  </script>
</body>
</html>
